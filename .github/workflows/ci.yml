name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    name: "Test (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            sanitize: address,undefined
          - os: macos-latest
            sanitize: address

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Meson and Ninja
        run: python -m pip install --upgrade meson ninja

      - name: Install OpenMP on Ubuntu
        run: sudo apt-get update && sudo apt-get install -y libomp-dev
        if: matrix.os == 'ubuntu-latest'

      - name: Configure (debug + tests)
        run: meson setup build --buildtype=debug -Dbuild_tests=true -Db_sanitize=${{ matrix.sanitize }}

      - name: Build
        run: meson compile -C build

      - name: Test
        run: meson test -C build --verbose

  static-analysis:
    name: Static analysis (cppcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: >
          cppcheck --enable=warning,style,performance
          --std=c11 --error-exitcode=1
          --suppress=missingIncludeSystem
          --suppress=unusedStructMember
          --suppress=unusedFunction
          --suppress=staticFunction
          --suppress=unreadVariable
          --suppress=constParameterPointer
          --suppress=syntaxError
          --suppress=nullPointerOutOfMemory
          --suppress=constVariable
          src/ include/ tests/ --inline-suppr

  release-build:
    name: Release build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Meson and Ninja
        run: python -m pip install --upgrade meson ninja

      - name: Install OpenMP on Ubuntu
        run: sudo apt-get update && sudo apt-get install -y libomp-dev
        if: matrix.os == 'ubuntu-latest'

      - name: Configure (release)
        run: meson setup build --buildtype=release -Dbuild_tests=false

      - name: Build
        run: meson compile -C build
